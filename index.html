<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奖项分组抽签工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        success: '#10B981',
                        danger: '#EF4444',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen py-8 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">🏆 奖项专属抽签工具</h1>
            <p class="text-gray-600">自定义奖项+单独设置各奖项抽取人数，人员不重复中奖</p>
        </div>

        <div class="bg-white rounded-xl shadow p-6 mb-6 space-y-8">
            <div>
                <h2 class="text-xl font-semibold mb-4 text-gray-800">
                    <i class="fa fa-trophy mr-2 text-primary"></i>一、抽签项目（自定义奖项+对应抽取人数）
                </h2>
                <div class="flex flex-wrap gap-3 mb-4 items-center">
                    <input id="prizeName" placeholder="奖项名称：一等奖" class="flex-1 min-w-[160px] px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                    <div class="flex items-center gap-2">
                        <span>抽取人数：</span>
                        <input type="number" id="prizeCount" min="1" value="1" class="w-20 px-3 py-2 border rounded-lg text-center">
                    </div>
                    <button id="addPrizeBtn" class="bg-primary text-white px-4 py-2 rounded-lg">添加奖项</button>
                </div>
                <div id="prizeList" class="space-y-2"></div>
            </div>

            <div>
                <h2 class="text-xl font-semibold mb-4 text-gray-800">
                    <i class="fa fa-users mr-2 text-primary"></i>二、抽签人员（批量导入/手动添加）
                </h2>
                <div class="flex gap-3 mb-3">
                    <input id="personInput" placeholder="输入人员姓名" class="flex-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-primary">
                    <button id="addPersonBtn" class="bg-primary text-white px-4 py-2 rounded-lg">添加</button>
                </div>
                <div class="mb-3">
                    <textarea id="batchPersonText" placeholder="批量导入，每行一个姓名
小明
小王
小李
小张" class="w-full px-4 py-2 border rounded-lg h-24"></textarea>
                    <button id="batchImportBtn" class="mt-2 bg-primary/80 text-white px-4 py-2 rounded-lg text-sm">批量导入人员</button>
                </div>
                <div id="personTagBox" class="flex flex-wrap gap-2 min-h-[40px]"></div>
            </div>

            <div class="flex gap-4 pt-2">
                <button id="drawBtn" class="flex-1 bg-success text-white py-3 rounded-lg text-lg font-medium">
                    <i class="fa fa-random mr-2"></i>开始抽签
                </button>
                <button id="resetAllBtn" class="bg-danger text-white px-6 py-3 rounded-lg">
                    <i class="fa fa-refresh mr-2"></i>全部重置
                </button>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow p-6">
            <h2 class="text-xl font-bold mb-4 text-gray-800">📋 抽签结果</h2>
            <div id="resultBox" class="space-y-4">
                <p class="text-gray-400 text-center py-6">点击下方【开始抽签】生成中奖名单</p>
            </div>
        </div>
    </div>

    <script>
        const prizeName = document.getElementById('prizeName');
        const prizeCount = document.getElementById('prizeCount');
        const addPrizeBtn = document.getElementById('addPrizeBtn');
        const prizeList = document.getElementById('prizeList');

        const personInput = document.getElementById('personInput');
        const addPersonBtn = document.getElementById('addPersonBtn');
        const batchPersonText = document.getElementById('batchPersonText');
        const batchImportBtn = document.getElementById('batchImportBtn');
        const personTagBox = document.getElementById('personTagBox');

        const drawBtn = document.getElementById('drawBtn');
        const resetAllBtn = document.getElementById('resetAllBtn');
        const resultBox = document.getElementById('resultBox');

        let prizeArr = [];
        let personArr = [];

        addPrizeBtn.addEventListener('click', () => {
            const name = prizeName.value.trim();
            const num = parseInt(prizeCount.value);
            if (!name) return alert('请填写奖项名称');
            if (isNaN(num) || num < 1) return alert('抽取人数必须大于等于1');
            const repeat = prizeArr.some(item => item.name === name);
            if (repeat) return alert('该奖项已存在');
            prizeArr.push({ name, num });
            renderPrize();
            prizeName.value = '';
            prizeCount.value = 1;
        })

        function renderPrize() {
            prizeList.innerHTML = prizeArr.map((item, index) => `
                <div class="flex justify-between items-center bg-blue-50 px-4 py-3 rounded-lg">
                    <span class="text-gray-800">${item.name}｜抽取人数：${item.num}人</span>
                    <i class="fa fa-times text-danger cursor-pointer" onclick="delPrize(${index})"></i>
                </div>
            `).join('');
        }
        window.delPrize = (idx) => {
            prizeArr.splice(idx, 1);
            renderPrize();
        }

        addPersonBtn.addEventListener('click', () => {
            const name = personInput.value.trim();
            if (!name) return;
            if (personArr.includes(name)) return alert('该人员已添加');
            personArr.push(name);
            renderPerson();
            personInput.value = '';
        })

        batchImportBtn.addEventListener('click', () => {
            const text = batchPersonText.value.trim();
            if (!text) return alert('请输入人员名单');
            const list = text.split('\n').map(i => i.trim()).filter(i => i);
            list.forEach(name => {
                if (!personArr.includes(name)) personArr.push(name);
            })
            renderPerson();
            batchPersonText.value = '';
        })

        function renderPerson() {
            personTagBox.innerHTML = personArr.map((name, idx) => `
                <span class="bg-green-100 text-green-800 px-3 py-1 rounded-full flex items-center gap-2">
                    ${name}
                    <i class="fa fa-times cursor-pointer" onclick="delPerson(${idx})"></i>
                </span>
            `).join('');
        }
        window.delPerson = (idx) => {
            personArr.splice(idx, 1);
            renderPerson();
        }

        drawBtn.addEventListener('click', () => {
            if (prizeArr.length === 0) return alert('请先添加至少一个奖项');
            if (personArr.length === 0) return alert('请添加参与抽签人员');
            const totalNeed = prizeArr.reduce((sum, item) => sum + item.num, 0);
            if (totalNeed > personArr.length) {
                return alert(`所有奖项一共需要${totalNeed}个名额，但当前仅${personArr.length}位人员，人数不足！`);
            }

            let tempPerson = [...personArr];
            let resultHtml = '';

            prizeArr.forEach(prize => {
                const selected = [];
                for (let i = 0; i < prize.num; i++) {
                    const randomIndex = Math.floor(Math.random() * tempPerson.length);
                    const selectedName = tempPerson[randomIndex];
                    selected.push(selectedName);
                    tempPerson.splice(randomIndex, 1);
                }
                resultHtml += `
                    <div class="border rounded-lg p-4">
                        <h3 class="font-bold text-lg text-primary mb-2">${prize.name}（${prize.num}人）</h3>
                        <div class="flex flex-wrap gap-2">
                            ${selected.map(name => `<span class="bg-gray-100 px-3 py-1 rounded-full">${name}</span>`).join('')}
                        </div>
                    </div>
                `;
            })
            resultBox.innerHTML = resultHtml;
        })

        resetAllBtn.addEventListener('click', () => {
            prizeArr = [];
            personArr = [];
            renderPrize();
            renderPerson();
            resultBox.innerHTML = '<p class="text-gray-400 text-center py-6">点击下方【开始抽签】生成中奖名单</p>';
            prizeName.value = '';
            prizeCount.value = 1;
            personInput.value = '';
            batchPersonText.value = '';
        })
    </script>
</body>
</html>
